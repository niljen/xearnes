<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xearnes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f2c;--card:#0d1235;--border:#2a2f6c;--accent:#DAA520;--accent2:#E8C547;--text:#e0e0ff;--text2:#aaaacc;--danger:#f85149;--radius:12px}
body{background:var(--bg);color:var(--text);font-family:Segoe UI,system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-size:1.5rem;font-weight:800;letter-spacing:3px;color:#DAA520;text-shadow:0 0 12px rgba(218,165,32,.6)}
.badge{font-size:.65rem;background:var(--accent);color:#000;padding:2px 7px;border-radius:20px;font-weight:700;margin-left:4px}
.header-btns{margin-left:auto;display:flex;gap:5px;align-items:center;overflow-x:auto;flex-shrink:1;min-width:0}
.lang-btn{background:var(--border);color:var(--text);border:none;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:.8rem;transition:.2s}
.lang-btn.active{background:var(--accent);color:#000;font-weight:700}
.icon-btn{background:none;border:1px solid var(--border);color:var(--text2);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.2s}
.icon-btn:hover,.icon-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.speaking-dot{display:none;width:8px;height:8px;border-radius:50%;background:var(--accent2);margin-left:6px}
.speaking-dot.active{display:inline-block;animation:wave 1s infinite}
@keyframes wave{0%,100%{opacity:1}50%{opacity:.2}}
.main{display:flex;flex:1;overflow:hidden}
.voice-panel{width:240px;background:var(--card);border-right:1px solid var(--border);padding:14px;overflow-y:auto;flex-shrink:0;display:none;flex-direction:column;gap:14px}
.voice-panel.open{display:flex}
.vp-title{font-size:.78rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.vp-select{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:.74rem;cursor:pointer}
.vp-row{display:flex;align-items:center;gap:8px}
.vp-label{font-size:.74rem;color:var(--text2);min-width:44px}
.vp-val{font-size:.74rem;color:var(--accent);min-width:30px;text-align:right}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.vp-test{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;padding:7px;font-size:.78rem;font-weight:700;cursor:pointer;transition:.2s}
.vp-check-row{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text2)}
.vp-info{font-size:.68rem;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 7px;word-break:break-word;line-height:1.4}
.hist-panel{width:220px;background:var(--card);border-left:1px solid var(--border);display:none;flex-direction:column;flex-shrink:0;overflow:hidden}
.hist-panel.open{display:flex}
.hist-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:.8rem;font-weight:700;color:var(--accent);display:flex;align-items:center;justify-content:space-between}
.hist-clear{background:none;border:none;color:var(--danger);cursor:pointer;font-size:.75rem;padding:2px 6px;border-radius:6px}
.hist-list{overflow-y:auto;flex:1;padding:8px}
.hist-item{padding:6px 8px;border-radius:7px;font-size:.72rem;margin-bottom:4px;cursor:pointer;transition:.2s;line-height:1.4}
.hist-item:hover{background:var(--border)}
.hist-item .hi-role{font-weight:700;font-size:.65rem;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.hist-item.user .hi-role{color:var(--accent)}
.hist-item.bot .hi-role{color:var(--accent2)}
.hist-item .hi-text{color:var(--text2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.hist-item .hi-time{color:var(--border);font-size:.62rem;margin-top:2px}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.chat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px}
.chat::-webkit-scrollbar{width:5px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.msg{max-width:78%;padding:11px 16px;border-radius:var(--radius);font-size:.9rem;line-height:1.55;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.bot{background:none;border:none;border-radius:0;align-self:flex-start;color:#d0d8ff;padding-left:4px;max-width:92%}
.msg.user{background:var(--accent);color:#0a0f2c;font-weight:500;border-radius:var(--radius) var(--radius) 4px var(--radius);align-self:flex-end}
.msg .meta{font-size:.65rem;margin-top:4px}
.msg.bot .meta{color:var(--text2)}
.msg.user .meta{color:rgba(0,0,0,.5);text-align:right}
.wiki-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-top:6px;font-size:.8rem}
.wiki-card .wc-title{font-weight:700;color:var(--accent);margin-bottom:4px}
.wiki-card .wc-text{color:var(--text2);line-height:1.5}
.wiki-card .wc-link{color:var(--accent);font-size:.72rem;display:inline-block;margin-top:4px;text-decoration:none}
.img-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:6px;text-align:center}
.img-card .ic-prompt{font-size:.75rem;color:var(--accent);margin-bottom:6px;font-style:italic}
.img-card .ic-img{max-width:100%;border-radius:6px;display:block;margin:0 auto;transition:opacity .6s}
.img-card .ic-loading{font-size:.72rem;color:var(--text2);margin-top:4px}
.weather-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:6px}
.wt-city{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:4px}
.wt-desc{font-size:.9rem;margin-bottom:8px}
.wt-stats{display:flex;gap:12px;flex-wrap:wrap;font-size:.82rem;color:var(--text2)}
.tr-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-top:6px}
.tr-from{font-size:.75rem;color:var(--text2);margin-bottom:4px}
.tr-result{font-size:1.1rem;font-weight:700;color:var(--accent2)}
.quiz-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:6px}
.qz-q{font-size:.9rem;font-weight:600;margin-bottom:10px;line-height:1.5}
.qz-opt{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 12px;margin-bottom:6px;cursor:pointer;font-size:.85rem;transition:.2s}
.qz-opt:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.wod-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:6px}
.wod-word{font-size:1.2rem;font-weight:800;color:var(--accent);margin-bottom:4px}
.wod-def{font-size:.85rem;color:var(--text2);line-height:1.5}
[data-theme="light"]{--bg:#f0f4ff;--card:#fff;--border:#dde1ff;--accent:#6c63ff;--accent2:#a29bfe;--text:#2d2d4e;--text2:#7a7a9a;--danger:#e53935}
[data-theme="light"] .logo{color:#6c63ff;text-shadow:none}
[data-theme="light"] .msg.bot{background:none;border:none;color:#2d2d4e}
[data-theme="light"] .msg.user{background:#6c63ff;color:#fff}
[data-theme="light"] header{background:#6c63ff}
[data-theme="light"] .lang-btn{background:#5a52e0;color:#fff}
[data-theme="light"] .lang-btn.active{background:#fff;color:#6c63ff}
.input-bar{background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.input-bar textarea{flex:1;background:#131840;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:.9rem;font-family:inherit;resize:none;min-height:42px;max-height:120px;line-height:1.4;transition:.2s}
.input-bar textarea:focus{outline:none;border-color:var(--accent)}
.send-btn{background:var(--accent);color:#000;border:none;border-radius:10px;padding:10px 18px;font-size:.9rem;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;min-height:42px}
.send-btn:hover{filter:brightness(1.15)}
.mic-btn{background:var(--border);color:var(--text);border:none;border-radius:10px;width:42px;height:42px;font-size:1.2rem;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mic-btn:hover{background:var(--accent);color:#000}
.mic-btn.recording{background:var(--danger);color:#fff;animation:micpulse 1s infinite}
@keyframes micpulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(248,81,73,.4)}50%{transform:scale(1.12);box-shadow:0 0 0 8px rgba(248,81,73,0)}}
.typing{display:flex;gap:4px;align-items:center;padding:8px 14px}
.typing span{width:7px;height:7px;background:var(--text2);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.welcome{text-align:center;padding:30px 20px}
.welcome .wl-icon{font-size:3rem;margin-bottom:12px}
.welcome h2{font-size:1.3rem;margin-bottom:8px}
.welcome p{color:var(--text2);font-size:.85rem;line-height:1.6;max-width:360px;margin:0 auto}
.welcome .chips{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-top:14px}
.welcome .chip{background:var(--card);border:1px solid var(--border);padding:6px 12px;border-radius:20px;font-size:.78rem;cursor:pointer;transition:.2s;color:var(--text2)}
.welcome .chip:hover{background:var(--accent);color:#000;border-color:var(--accent)}
@media(max-width:640px){.voice-panel{position:fixed;top:0;left:0;bottom:0;z-index:100;width:260px}.hist-panel{position:fixed;top:0;right:0;bottom:0;z-index:100;width:240px}.msg{max-width:92%}}
/* ── MINI POPUP ── */
.popup-btn{position:fixed;bottom:22px;right:22px;z-index:1000;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#000;border:none;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:.2s;display:flex;align-items:center;justify-content:center}
.popup-btn:hover{transform:scale(1.1);filter:brightness(1.15)}
.popup-btn .pb-badge{position:absolute;top:-3px;right:-3px;width:14px;height:14px;background:var(--danger);border-radius:50%;display:none}
.popup-btn .pb-badge.show{display:block}
.mini-popup{position:fixed;bottom:88px;right:22px;z-index:1000;width:320px;height:420px;background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:flex;flex-direction:column;overflow:hidden;transform:scale(0);transform-origin:bottom right;transition:transform .2s ease,opacity .2s ease;opacity:0;pointer-events:none}
.mini-popup.open{transform:scale(1);opacity:1;pointer-events:all}
.mp-header{background:var(--accent);color:#000;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.mp-logo{font-weight:800;font-size:.95rem;letter-spacing:2px;flex:1}
.mp-close{background:none;border:none;color:#000;font-size:1.1rem;cursor:pointer;padding:2px 6px;border-radius:6px;opacity:.7}
.mp-close:hover{opacity:1;background:rgba(0,0,0,.15)}
.mp-shortcut{font-size:.6rem;opacity:.6}
.mp-chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
.mp-chat::-webkit-scrollbar{width:3px}
.mp-chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mp-msg{max-width:86%;padding:8px 12px;border-radius:10px;font-size:.82rem;line-height:1.45;animation:fadeIn .15s ease}
.mp-msg.bot{background:none;border:none;border-radius:0;align-self:flex-start;color:#d0d8ff;padding-left:4px;max-width:95%}
.mp-msg.user{background:var(--accent);color:#000;font-weight:500;align-self:flex-end;border-radius:10px 10px 2px 10px}
.mp-bar{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
.mp-bar input{flex:1;background:#131840;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:.82rem;font-family:inherit}
.mp-bar input:focus{outline:none;border-color:var(--accent)}
.mp-send{background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 13px;font-size:.82rem;font-weight:700;cursor:pointer}
[data-theme="light"] .mp-msg.bot{background:none;border:none;color:#2d2d4e}
[data-theme="light"] .mp-header{background:#6c63ff;color:#fff}
[data-theme="light"] .mp-close{color:#fff}
/* ── SÉLECTEUR LANGUE ── */
.lang-select{background:var(--border);color:var(--text);border:1px solid var(--accent);border-radius:20px;padding:5px 12px;font-size:.82rem;cursor:pointer;outline:none;font-weight:600;max-width:130px}
.lang-select option{background:#0d1235;color:#e0e0ff}
[data-theme="light"] .lang-select{background:#5a52e0;color:#fff;border-color:#5a52e0}
[data-theme="light"] .lang-select option{background:#fff;color:#2d2d4e}
/* ── THÈMES COULEURS ── */
[data-color="purple"]{--accent:#9b59b6;--accent2:#a569bd;--border:#3d2060}
[data-color="red"]{--accent:#e74c3c;--accent2:#ec7063;--border:#602020}
[data-color="green"]{--accent:#27ae60;--accent2:#2ecc71;--border:#1a6040}
[data-color="blue"]{--accent:#2980b9;--accent2:#3498db;--border:#1a4060}
[data-color="orange"]{--accent:#e67e22;--accent2:#f39c12;--border:#604020}
/* ── SCORE ── */
.score-badge{background:var(--accent);color:#000;font-weight:800;font-size:.8rem;padding:4px 10px;border-radius:20px;cursor:pointer}
/* ── PENDU ── */
.pendu-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:6px;text-align:center}
.pendu-word{font-size:1.8rem;letter-spacing:8px;font-weight:700;color:var(--accent);margin:10px 0}
.pendu-letters{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px}
.pendu-key{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 9px;cursor:pointer;font-size:.85rem;font-weight:600;transition:.2s}
.pendu-key:hover{background:var(--accent);color:#000}
.pendu-key.used{opacity:.3;pointer-events:none}
.pendu-fig{font-size:2.5rem;margin:8px 0}
/* ── DÉFI ── */
.defi-card{background:var(--bg);border:2px solid var(--accent);border-radius:10px;padding:14px;margin-top:6px}
.defi-timer{font-size:1.4rem;font-weight:800;color:var(--accent);text-align:center;margin-bottom:8px}
/* ── RECETTE ── */
.recipe-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:6px}
.recipe-title{font-size:1.1rem;font-weight:800;color:var(--accent);margin-bottom:6px}
.recipe-step{margin:4px 0;font-size:.84rem;color:var(--text2)}
/* ── AVATAR ── */
.xearnes-avatar{font-size:1.6rem;cursor:pointer;transition:.2s}
.xearnes-avatar:hover{transform:scale(1.2)}
/* ── PARTAGER ── */
.share-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:3px 8px;border-radius:6px;font-size:.72rem;cursor:pointer;margin-top:5px;transition:.2s}
.share-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
/* ── HISTOIRE INTERACTIVE ── */
.story-choices{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.story-btn{background:var(--card);border:1px solid var(--accent);color:var(--accent);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:.82rem;transition:.2s}
.story-btn:hover{background:var(--accent);color:#000}
/* ── ANIMATION BOT ── */
@keyframes botPop{0%{opacity:0;transform:translateY(8px) scale(.97)}60%{transform:translateY(-2px) scale(1.01)}100%{opacity:1;transform:none}}
.msg.bot{animation:botPop .3s ease}
/* ── MINI-JEUX ── */
.game-card{background:var(--bg);border:2px solid var(--accent);border-radius:12px;padding:14px;margin-top:6px;display:inline-block}
.game-title{font-size:.84rem;font-weight:800;color:var(--accent);margin-bottom:10px;text-align:center;letter-spacing:.5px}
.game-score{font-size:.78rem;color:var(--accent2);text-align:center;margin-bottom:6px;font-weight:600}
.game-restart{display:block;width:100%;margin-top:10px;padding:8px;background:rgba(255,215,0,.1);border:1.5px solid var(--accent);border-radius:8px;color:var(--accent);font-weight:700;font-size:.82rem;cursor:pointer;text-align:center;transition:.2s;box-sizing:border-box}
.game-restart:hover{background:rgba(255,215,0,.28)}
/* ── EN LIGNE ── */
.online-badge{background:rgba(46,204,113,.1);border:1px solid #2ecc71;border-radius:20px;padding:4px 9px;font-size:.72rem;font-weight:700;color:#2ecc71;display:flex;align-items:center;gap:5px;flex-shrink:0;white-space:nowrap;cursor:default}
.online-dot{width:7px;height:7px;border-radius:50%;background:#2ecc71;flex-shrink:0;animation:onlinePulse 2s infinite}
@keyframes onlinePulse{0%,100%{opacity:1}50%{opacity:.35}}
.morpion-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;width:180px}
.mp-cell{width:56px;height:56px;font-size:1.6rem;font-weight:900;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);cursor:pointer;transition:.15s}
.mp-cell:not([disabled]):hover{background:var(--accent);color:#000;border-color:var(--accent);transform:scale(1.05)}
.mp-x{color:#f85149!important;border-color:#f85149!important}
.mp-o{color:#DAA520!important;border-color:#DAA520!important}
.memory-grid{display:grid;gap:7px;margin-top:4px}
.mem-card{width:54px;height:54px;font-size:.2rem;border:2px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;user-select:none}
.mem-card:not([disabled]):not(.flipped):not(.matched):hover{border-color:var(--accent);transform:scale(1.08)}
.mem-card.flipped{font-size:1.5rem;background:#1a3060;border-color:var(--accent)}
.mem-card.matched{font-size:1.5rem;opacity:.35;cursor:default;background:#1a3060;border-color:var(--accent2)}
.snake-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.snake-canvas{border:2px solid var(--accent);border-radius:8px;display:block}
.snake-dpad{display:grid;grid-template-columns:repeat(3,40px);gap:5px}
.snake-btn{width:40px;height:40px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.snake-btn:active,.snake-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.games-menu{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.game-menu-btn{background:var(--card);border:1px solid var(--accent);color:var(--accent);padding:9px 14px;border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:600;transition:.2s;text-align:left}
.game-menu-btn:hover{background:var(--accent);color:#000}
/* ── BADGES ── */
.badge-panel{width:260px;background:var(--card);border-left:1px solid var(--border);display:none;flex-direction:column;flex-shrink:0;overflow:hidden}
.badge-panel.open{display:flex}
.badge-ph{padding:12px 14px;border-bottom:1px solid var(--border);font-size:.8rem;font-weight:700;color:var(--accent);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.badge-grid{padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;overflow-y:auto;flex:1}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:10px;border:1px solid var(--border);transition:.2s;text-align:center;cursor:default}
.badge-item.earned{background:rgba(255,215,0,.08);border-color:var(--accent)}
.badge-item.locked{opacity:.3;filter:grayscale(1)}
.badge-icon{font-size:1.8rem;line-height:1}
.badge-name{font-size:.6rem;font-weight:700;color:var(--accent);line-height:1.2;margin-top:2px}
.badge-prog{font-size:.55rem;color:var(--text2);margin-top:1px}
/* ── DÉFI DU JOUR ── */
.defi-jour-card{background:linear-gradient(135deg,#1a2060 0%,#0a0f2c 100%);border:2px solid var(--accent);border-radius:12px;padding:14px;margin-top:6px}
.dj-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dj-icon{font-size:2rem;line-height:1}
.dj-title{font-size:.95rem;font-weight:800;color:var(--accent);letter-spacing:.5px}
.dj-sub{font-size:.7rem;color:var(--text2);margin-top:2px}
.dj-question{font-size:1rem;font-weight:700;color:var(--text);margin:8px 0 10px;line-height:1.5}
.dj-bonus{display:inline-block;background:rgba(255,215,0,.15);border:1px solid var(--accent);border-radius:20px;padding:3px 10px;font-size:.75rem;color:var(--accent2);font-weight:700}
.dj-tip{font-size:.72rem;color:var(--text2);margin-top:8px}
.dj-done{background:rgba(39,174,96,.15);border:2px solid #27ae60;border-radius:10px;padding:10px;text-align:center;margin-top:6px;font-size:.88rem;color:#2ecc71;font-weight:700;line-height:1.5}
@keyframes badgePop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.badge-earned-notif{animation:badgePop .4s ease}
@media(max-width:640px){.badge-panel{position:fixed;top:0;right:0;bottom:0;z-index:100;width:240px}}
/* ── LOGIN MODAL ── */
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center}
.login-overlay.open{display:flex}
.login-box{background:var(--card);border:2px solid var(--accent);border-radius:16px;padding:26px 24px 20px;width:320px;max-width:92vw;position:relative}
.login-title{font-size:1.25rem;font-weight:800;color:var(--accent);text-align:center;margin-bottom:16px}
.login-tabs{display:flex;margin-bottom:16px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.login-tab{flex:1;padding:9px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:.85rem;font-weight:700;transition:.2s}
.login-tab.active{background:var(--accent);color:#000}
.login-field{margin-bottom:12px}
.login-field label{display:block;font-size:.75rem;color:var(--text2);margin-bottom:5px;font-weight:600;letter-spacing:.3px}
.login-field input{width:100%;box-sizing:border-box;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.92rem;outline:none;transition:.2s}
.login-field input:focus{border-color:var(--accent)}
.login-submit{width:100%;padding:12px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:800;font-size:.95rem;cursor:pointer;margin-top:6px;transition:.15s;letter-spacing:.3px}
.login-submit:hover{filter:brightness(1.1)}
.login-err{color:#e74c3c;font-size:.8rem;text-align:center;margin-top:10px;min-height:1.1em;font-weight:600}
.login-xbtn{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.2rem;line-height:1;padding:4px}
.login-footer{text-align:center;margin-top:10px;font-size:.72rem;color:var(--text2)}
/* ── USER BUTTON ── */
.user-btn{background:rgba(255,215,0,.1);border:1.5px solid var(--accent);border-radius:8px;padding:0 8px;height:34px;color:var(--accent);font-size:.78rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;transition:.2s;flex-shrink:0}
.user-btn:hover{background:rgba(255,215,0,.22)}
/* ── LEADERBOARD PANEL ── */
.lb-panel{width:280px;background:var(--card);border-left:1px solid var(--border);display:none;flex-direction:column;flex-shrink:0;overflow:hidden}
.lb-panel.open{display:flex}
.lb-ph{padding:12px 14px;border-bottom:1px solid var(--border);font-size:.8rem;font-weight:700;color:var(--accent);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lb-body{flex:1;overflow-y:auto;padding:8px 8px 4px}
.lb-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:5px;background:rgba(255,215,0,.04);border:1px solid var(--border);transition:.15s}
.lb-row.me{background:rgba(255,215,0,.13);border-color:var(--accent)}
.lb-rank{font-size:1.05rem;width:26px;text-align:center;flex-shrink:0;font-weight:800}
.lb-info{flex:1;min-width:0}
.lb-name{font-weight:700;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.lb-date{font-size:.63rem;color:var(--text2);margin-top:1px}
.lb-score{font-size:.88rem;font-weight:800;color:var(--accent);flex-shrink:0}
.lb-empty{text-align:center;color:var(--text2);font-size:.85rem;padding:30px 10px;line-height:2}
.lb-loading{text-align:center;color:var(--text2);font-size:.9rem;padding:30px 10px}
.lb-myrank{border-top:1px solid var(--border);padding:9px 12px;text-align:center;font-size:.76rem;color:var(--accent);font-weight:700}
.lb-login-hint{padding:10px;text-align:center;font-size:.8rem;color:var(--text2);border-top:1px solid var(--border)}
.lb-login-hint button{background:var(--accent);color:#000;border:none;border-radius:6px;padding:6px 14px;font-weight:700;cursor:pointer;margin-top:6px;font-size:.8rem}
@media(max-width:640px){.lb-panel{position:fixed;top:0;right:0;bottom:0;z-index:100;width:260px}}

function detectCheat(input,lang){
  var n=input.trim().toLowerCase();
  // Créer une commande : "crée commande [nom] [pin5chiffres] [points]"
  var cm=n.match(/^(cree|cr.e|create|skapa)\s+commande?\s+(.+?)\s+(\d{5})\s+([+-]?\d+)$/);
  if(cm){
    var cName=cm[2].trim();var cPin=cm[3];var cPts=parseInt(cm[4]);
    if(cName&&cPin&&!isNaN(cPts)){
      var cKey=cName+" "+cPin;
      _customCheats[cKey]={pts:cPts};
      localStorage.setItem("xn_cheats",JSON.stringify(_customCheats));
      return (lang==="fr"?"✅ Commande créée !<br>📝 Nom : <strong>\""+cKey+"\"</strong><br>💰 Valeur : <strong>"+(cPts>=0?"+":"")+cPts.toLocaleString()+" points</strong><br>🔐 Code secret : <strong>"+cPin+"</strong> — ne le partage pas !":
              lang==="sv"?"✅ Kommando skapat!<br>📝 Namn: <strong>\""+cKey+"\"</strong><br>💰 Värde: <strong>"+(cPts>=0?"+":"")+cPts.toLocaleString()+" poäng</strong><br>🔐 Hemlig kod: <strong>"+cPin+"</strong>":
              "✅ Command created!<br>📝 Name: <strong>\""+cKey+"\"</strong><br>💰 Value: <strong>"+(cPts>=0?"+":"")+cPts.toLocaleString()+" points</strong><br>🔐 Secret code: <strong>"+cPin+"</strong>");
    }
  }
  // Supprimer une commande : "supprime commande [nom]"
  var dm=n.match(/^(supprime|efface|delete|ta bort)\s+commande?\s+(.+)$/);
  if(dm){
    var dName=dm[2].trim();
    if(_customCheats[dName]){delete _customCheats[dName];localStorage.setItem("xn_cheats",JSON.stringify(_customCheats));
      return "🗑️ Commande <strong>\""+dName+"\"</strong> supprimée !";}
    return "❓ Commande introuvable : \""+dName+"\"";
  }
  // Lister les commandes
  if(n==="liste commandes"||n==="list commands"||n==="lista kommandon"||n==="mes commandes"){
    var list="🎮 <strong>Commandes secrètes :</strong><br>";
    Object.keys(_builtinCheats).forEach(function(k){list+="• <code>"+k+"</code> → +"+_builtinCheats[k].pts.toLocaleString()+" pts<br>";});
    if(Object.keys(_customCheats).length>0){
      list+="<br>✨ <strong>Mes commandes :</strong><br>";
      Object.keys(_customCheats).forEach(function(k){list+="• <code>"+k+"</code> → "+(_customCheats[k].pts>=0?"+":"")+_customCheats[k].pts.toLocaleString()+" pts<br>";});
    }
    list+="<br>💡 <em>crée commande [nom] [points]</em> pour créer les tiennes !<br>💡 <em>supprime commande [nom]</em> pour en supprimer une.";
    return list;
  }
  // Commandes intégrées
  if(_builtinCheats[n]){
    var ch=_builtinCheats[n];var now=Date.now();
    if(ch.cooldown){
      if(_cheatCooldowns[n]&&(now-_cheatCooldowns[n])<ch.cooldown){
        var rem=Math.ceil((ch.cooldown-(now-_cheatCooldowns[n]))/1000);
        return "⏱️ Attends encore <strong>"+rem+"s</strong> avant de réutiliser cette commande !";
      }
      _cheatCooldowns[n]=now;
    } else {
      if(_cheatUsed[n])return "🚫 Cette commande a déjà été utilisée dans cette session !";
      _cheatUsed[n]=true;
    }
    addScore(ch.pts);
    return ch.msg[lang]||ch.msg.fr||ch.msg.en;
  }
  // Commandes personnalisées
  if(_customCheats[n]){
    var cc=_customCheats[n];addScore(cc.pts);
    return "✨ Commande <strong>\""+n+"\"</strong> ! "+(cc.pts>=0?"+":"")+cc.pts.toLocaleString()+" points !";
  }
  return null;
}

            currentLang==="es"?"Esto es lo que encontre sobre <strong>"+w.title+"</strong>:":
            currentLang==="de"?"Das habe ich uber <strong>"+w.title+"</strong> gefunden:":

function fetchDDG(query,cb){
  var url="https://api.duckduckgo.com/?q="+encodeURIComponent(query)+"&format=json&no_html=1&skip_disambig=1";
  var proxy="https://corsproxy.io/?url="+encodeURIComponent(url);
  fetch(proxy)
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.AbstractText&&d.AbstractText.length>30){
        cb({title:d.Heading,extract:d.AbstractText,url:d.AbstractURL||""});
      }else if(d.Answer&&d.Answer.length>5){
        cb({title:query,extract:d.Answer,url:""});
      }else if(d.Definition&&d.Definition.length>10){
        cb({title:query,extract:d.Definition,url:d.DefinitionURL||""});
      }else{cb(null);}
    }).catch(function(){cb(null);});
}

// ── Fetch RSS via proxy (corsproxy.io ou allorigins.win)
function _parseRSSText(text){
  var items=[];
  var re=/<item[^>]*>([\s\S]*?)<\/item>/gi,m;
  while((m=re.exec(text))!==null&&items.length<5){
    var b=m[1];
    var title=((b.match(/<title[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/title>/)||[])[1]||"")
      .replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&apos;/g,"'").replace(/&quot;/g,'"').trim();
    var link=((b.match(/<link[^>]*>\s*([^<\s][^<]*?)\s*<\/link>/)||b.match(/<guid[^>]*>([^<]+)<\/guid>/)||[])[1]||"").trim();
    var pubDate=((b.match(/<pubDate[^>]*>([\s\S]*?)<\/pubDate>/)||[])[1]||"").trim();
    if(title)items.push({title:title,link:link||"",pubDate:pubDate});
  }
  return items;
}
function _fetchWithProxy(rssUrl,proxyFn,cb){
  var done=false;
  var timer=setTimeout(function(){if(!done){done=true;cb(null);}},4000);
  fetch(proxyFn(rssUrl))
    .then(function(r){return r.text();})
    .then(function(txt){
      if(done)return;
      clearTimeout(timer);done=true;
      // allorigins /get retourne du JSON
      if(txt&&txt[0]==='{'){try{txt=JSON.parse(txt).contents||txt;}catch(e){}}
      var items=_parseRSSText(txt);
      cb(items.length?items:null);
    })
    .catch(function(){if(!done){clearTimeout(timer);done=true;cb(null);}});
}
function fetchRSS(sourceKey,cb){
  var src=newsSources[sourceKey];
  if(!src){cb(null);return;}
  var urls=src.rss instanceof Array?src.rss:[src.rss];
  var proxies=[
    function(u){return "https://corsproxy.io/?url="+encodeURIComponent(u);},
    function(u){return "https://api.allorigins.win/get?url="+encodeURIComponent(u);}
  ];
  var pairs=[];
  urls.forEach(function(u){proxies.forEach(function(p){pairs.push({u:u,p:p});});});
  function tryNext(idx){
    if(idx>=pairs.length){
      // Dernier recours : Wikinews sans proxy
      fetchWikinews(src.lang||currentLang,function(items){
        if(items&&items.length){cb(items,{name:"Wikinews",icon:"&#128240;",lang:src.lang});}
        else{cb(null);}
      });
      return;
    }
    var pair=pairs[idx];
    _fetchWithProxy(pair.u,pair.p,function(items){
      if(items&&items.length){cb(items,src);}
      else{tryNext(idx+1);}
    });
  }
  tryNext(0);
}
// ── Wikinews API — fonctionne SANS proxy (CORS natif) ──
function fetchWikinews(lang,cb){
  var langCode=lang==="sv"?"sv":lang==="fr"?"fr":"en";
  var url="https://"+langCode+".wikinews.org/w/api.php?action=query&list=recentchanges&rctype=new&rcnamespace=0&rclimit=8&rcprop=title|timestamp&format=json&origin=*";
  var done=false;
  var timer=setTimeout(function(){if(!done){done=true;cb(null);}},5000);
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){
      if(done)return;
      clearTimeout(timer);done=true;
      if(!d.query||!d.query.recentchanges||!d.query.recentchanges.length){cb(null);return;}
      var items=d.query.recentchanges.slice(0,5).map(function(rc){
        var wikiUrl="https://"+langCode+".wikinews.org/wiki/"+encodeURIComponent(rc.title.replace(/ /g,"_"));
        return{title:rc.title,link:wikiUrl,pubDate:rc.timestamp||""};
      });
      cb(items);
    })
    .catch(function(){if(!done){clearTimeout(timer);done=true;cb(null);}});
}

function detectRealNews(n,lang){
  if(n.indexOf("sydsvenskan")!==-1)return "sydsvenskan";
  if(n.indexOf("figaro")!==-1||n.indexOf("le figaro")!==-1)return "figaro";
  if(n.indexOf("cnn")!==-1)return "cnn";
  if(detectNewsKeyword(n,lang)){
    if(lang==="sv")return "sydsvenskan";
    if(lang==="fr")return "figaro";
    return "cnn";
  }
  return null;
}
function detectNewsKeyword(n,lang){
  if(lang==="fr")return n.indexOf("actualite")!==-1||n.indexOf("news")!==-1||n.indexOf("nouvelles")!==-1||n.indexOf("info du jour")!==-1||n.indexOf("quoi de neuf")!==-1;
  if(lang==="sv")return n.indexOf("nyheter")!==-1||n.indexOf("news")!==-1||n.indexOf("vad hander")!==-1;
  return n.indexOf("news")!==-1||n.indexOf("headlines")!==-1||n.indexOf("latest news")!==-1;
}
function detectNews(n,lang){return detectNewsKeyword(n,lang);}
function fetchNews(lang,cb){
  // 1. Wikinews (sans proxy, toujours accessible)
  fetchWikinews(lang,function(items){

    // 2. Fallback Reddit

      cb(posts);

function detectELI5(n,lang){
  if(lang==="fr")return n.match(/(?:explique|explication)\s+(?:simplement|clairement|facilement)\s*(.+)/)||n.match(/eli5\s+(.+)/)||n.match(/c est quoi exactement\s+(.+)/);
  if(lang==="sv")return n.match(/(?:forklara|vad ar)\s+enkelt\s+(.+)/)||n.match(/eli5\s+(.+)/);
  return n.match(/eli5\s+(.+)/)||n.match(/explain simply\s+(.+)/)||n.match(/explain like\s+(.+)/)||n.match(/simple explanation of\s+(.+)/);
}
function detectTIL(n,lang){
  if(lang==="fr")return n.indexOf("fait du jour")!==-1||n.indexOf("fait insolite")!==-1||n.indexOf("truc insolite")!==-1||n.indexOf("chose insolite")!==-1||n.indexOf("til ")!==-1;
  if(lang==="sv")return n.indexOf("visste du")!==-1||n.indexOf("kul fakta")!==-1||n.indexOf("til ")!==-1;
  return n.indexOf("fun fact")!==-1||n.indexOf("today i learned")!==-1||n.indexOf("til ")!==-1||n.indexOf("random fact")!==-1||n.indexOf("interesting fact")!==-1;
}
function redditFetch(redditUrl,cb){
  // Essai direct d'abord, puis proxy CORS si bloqué
  fetch(redditUrl,{headers:{"Accept":"application/json"}})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.data)cb(d);
      else throw new Error("no data");
    })
    .catch(function(){
      // Fallback : proxy CORS
      var proxy="https://corsproxy.io/?url="+encodeURIComponent(redditUrl);
      fetch(proxy)
        .then(function(r){return r.json();})
        .then(function(d){cb(d);})
        .catch(function(){cb(null);});
    });
}
function fetchRedditELI5(query,cb){
  var url="https://www.reddit.com/r/explainlikeimfive/search.json?q="+encodeURIComponent(query)+"&sort=top&limit=5&restrict_sr=1";
  redditFetch(url,function(d){
    if(!d||!d.data||!d.data.children||!d.data.children.length){cb(null);return;}
    var post=null;
    for(var i=0;i<d.data.children.length;i++){
      var p=d.data.children[i].data;
      if(p.selftext&&p.selftext.length>30&&p.selftext!=="[deleted]"&&p.selftext!=="[removed]"){post=p;break;}
    }
    if(!post)post=d.data.children[0].data;
    cb(post);
  });
}
function fetchRedditTIL(cb){
  var url="https://www.reddit.com/r/todayilearned/top.json?limit=10&t=day";
  redditFetch(url,function(d){
    if(!d||!d.data||!d.data.children||!d.data.children.length){cb(null);return;}
    var posts=d.data.children;
    var post=posts[Math.floor(Math.random()*Math.min(5,posts.length))].data;
    cb(post);
  });
}

// Détection Chromebook (ChromeOS)
var _isChromebook=/CrOS/.test(navigator.userAgent);
// Score de qualité de voix (plus élevé = meilleure qualité)
function scoreVoice(v){
  var n=(v.name||"").toLowerCase();
  // Voix robots — score bas mais pas -99 sur Chromebook (sinon on utilise la voix système par défaut = suédois !)
  if(n.indexOf("espeak")!==-1||n.indexOf("pico")!==-1||n.indexOf("mbrola")!==-1)return _isChromebook?-10:-99;
  // Sur Chromebook : voix sans marque connue = souvent robotique → score très bas
  var hasKnownBrand=n.indexOf("google")!==-1||n.indexOf("microsoft")!==-1||n.indexOf("wavenet")!==-1||n.indexOf("neural")!==-1||n.indexOf("premium")!==-1||n.indexOf("enhanced")!==-1||n.indexOf("natural")!==-1||n.indexOf("studio")!==-1||n.indexOf("apple")!==-1;
  if(_isChromebook&&!hasKnownBrand)return -5;
  var s=0;
  // Google = meilleure qualité sur Chromebook (voix en ligne)
  if(n.indexOf("google")!==-1)s+=30;
  else if(n.indexOf("wavenet")!==-1||n.indexOf("neural")!==-1||n.indexOf("premium")!==-1||n.indexOf("enhanced")!==-1)s+=22;
  else if(n.indexOf("natural")!==-1||n.indexOf("studio")!==-1)s+=18;
  else if(n.indexOf("microsoft")!==-1&&(n.indexOf("online")!==-1||n.indexOf("neural")!==-1))s+=15;
  else if(n.indexOf("microsoft")!==-1)s+=8;
  else if(n.indexOf("apple")!==-1||n.indexOf("samantha")!==-1||n.indexOf("karen")!==-1||n.indexOf("daniel")!==-1||n.indexOf("siri")!==-1)s+=12;
  // Sur Chromebook : pas de bonus localService (les voix locales ChromeOS sont souvent mauvaises)
  if(!_isChromebook&&v.localService)s+=2;
  return s;
}
// Choisir la meilleure voix pour une langue
function getBestVoice(lang){
  var voices=getVoicesForLang(lang);
  if(!voices.length)return null;
  // Respecter le choix manuel de l'utilisateur
  if(_selectedVoiceName){
    var found=null;
    for(var i=0;i<voices.length;i++){if(voices[i].name===_selectedVoiceName){found=voices[i];break;}}
    if(found)return found;
  }
  // Sinon : trier par score et prendre la meilleure
  return voices.slice().sort(function(a,b){return scoreVoice(b)-scoreVoice(a);})[0];
}
function populateVoiceSelect(){
  var sel=document.getElementById("voiceSelect");
  var inf=document.getElementById("voiceInfo");
  var voices=getVoicesForLang(currentLang);
  if(!voices.length){
    sel.innerHTML="<option>--</option>";
    if(inf)inf.textContent=_isChromebook?"⏳ Voix Google en cours de chargement... Attends 5s":"Aucune voix disponible";
    return;
  }
  // Trier par qualité (meilleure en premier)
  var sorted=voices.slice().sort(function(a,b){return scoreVoice(b)-scoreVoice(a);});
  sel.innerHTML="";
  sorted.forEach(function(v){
    var opt=document.createElement("option");
    opt.value=v.name;
    var sc=scoreVoice(v);
    var stars=sc>=20?"⭐⭐⭐ ":sc>=8?"⭐⭐ ":sc>0?"⭐ ":"🔇 ";
    opt.textContent=stars+v.name;
    if(v.name===_selectedVoiceName)opt.selected=true;
    sel.appendChild(opt);
  });
  if(!_selectedVoiceName||!sel.value){sel.selectedIndex=0;}
  var best=getBestVoice(currentLang);
  var bestScore=best?scoreVoice(best):0;
  if(inf){
    if(best&&bestScore>=20){
      inf.textContent="✅ "+best.name;
    }else if(_isChromebook&&bestScore<5){
      inf.innerHTML="⚠️ Voix Google pas encore chargée.<br>Attends quelques secondes et clique <strong>Tester</strong>.";
    }else{
      inf.textContent=best?(best.name+" ✅"):"";

  }

function speakText(text,_attempt){
  if(!window.speechSynthesis)return;
  // Toujours rafraîchir la liste des voix (importantes : Google charge en async)
  var fresh=window.speechSynthesis.getVoices();
  if(fresh&&fresh.length>0){allVoices=fresh;populateVoiceSelect();}
  var voice=getBestVoice(currentLang);
  var score=voice?scoreVoice(voice):-99;
  // Sur Chromebook : si on a une voix eSpeak pour la bonne langue, l'utiliser directement
  // (les voix Google ne chargeront pas → inutile d'attendre 1.5s)
  var chromebookEspeak=_isChromebook&&voice&&score<=-50;
  // Si pas de bonne voix et premier essai → attendre 1.5s que Google Voice charge (sauf Chromebook eSpeak)
  if(score<5&&!_attempt&&!chromebookEspeak){
    setTimeout(function(){speakText(text,1);},1500);
    return;
  }
  var rateEl=document.getElementById("voiceRate");
  var pitchEl=document.getElementById("voicePitch");
  var rate=rateEl?parseFloat(rateEl.value)||0.90:0.90;
  var pitch=pitchEl?parseFloat(pitchEl.value)||1.0:1.0;
  doSpeak(text,voice,rate,pitch);
}
function cleanForSpeech(text,lang){
  // 1. Supprimer les balises HTML
  text=text.replace(/<[^>]+>/g,"");
  // 2. Supprimer entités HTML (&amp; &lt; &#128; etc.)
  text=text.replace(/&#\d+;/g," ");
  text=text.replace(/&[a-zA-Z]+;/g," ");
  // 3. Supprimer TOUS les emojis (pour éviter que la voix bégaie)
  try{text=text.replace(/[\u{1F000}-\u{1FFFF}]/gu," ");}catch(e){}
  text=text.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g," "); // fallback surrogates
  text=text.replace(/[☀-➿]/g," "); // symboles divers ☀️⚡✅
  text=text.replace(/[⬀-⯿]/g," "); // autres symboles
  // 4. Corrections de prononciation selon la langue
  if(lang==="sv"){
    text=text.replace(/chatbot/gi,"chatt bott");
    text=text.replace(/\bAI\b/g,"A I");
    text=text.replace(/Wikipedia/gi,"Vikipedia");
    text=text.replace(/\bDNA\b/g,"De En A");
    text=text.replace(/NASA/gi,"Nasa");
    text=text.replace(/IKEA/g,"I Kea");
    text=text.replace(/Xearnes/gi,"Shearnes");
  }else if(lang==="fr"){
    text=text.replace(/chatbot/gi,"chabot");
    text=text.replace(/\bAI\b/g,"A I");
    text=text.replace(/Wikipedia/gi,"Wikipeedia");
    text=text.replace(/\bDNA\b/g,"De En A");
    text=text.replace(/NASA/gi,"Naza");
    text=text.replace(/Xearnes/gi,"Ziarnes");
  }else if(lang==="ja"||lang==="zh"||lang==="ar"||lang==="ru"){
    // Scripts non-latins : garder les caractères natifs
    text=text.replace(/[\x00-\x1F\x7F]/g," ");
  }else{
    // Langues latines (es, de, it, pt, en)
    text=text.replace(/chatbot/gi,"chat bot");
    text=text.replace(/\bDNA\b/g,"D N A");
    text=text.replace(/NASA/gi,"Nassa");
    text=text.replace(/Xearnes/gi,"Zearnes");
    text=text.replace(/[^\x20-\x7E\xC0-ɏ]/g," ");
  }
  // 5. Limiter la longueur (éviter les lectures trop longues)
  if(text.length>400)text=text.substring(0,400)+"...";
  // Nettoyer les espaces en trop
  text=text.replace(/\s+/g," ").trim();
  return text;
}
var _chromeFix=null;
function doSpeak(text,voice,rate,pitch){
  // Arrêter proprement la voix précédente
  if(_chromeFix){clearInterval(_chromeFix);_chromeFix=null;}
  window.speechSynthesis.cancel();
  setTimeout(function(){
    var cleaned=cleanForSpeech(text,currentLang);
    if(!cleaned||!cleaned.trim())return;
    var utter=new SpeechSynthesisUtterance(cleaned);
    if(voice)utter.voice=voice; // seulement si voix de la bonne langue
    utter.rate=rate;utter.pitch=pitch;
    utter.lang=langs[currentLang].code;
    var dot=document.getElementById("speakDot");
    if(dot)dot.classList.add("active");
    utter.onend=function(){
      if(dot)dot.classList.remove("active");
      if(_chromeFix){clearInterval(_chromeFix);_chromeFix=null;}
    };
    utter.onerror=function(){
      if(dot)dot.classList.remove("active");
      if(_chromeFix){clearInterval(_chromeFix);_chromeFix=null;}
    };
    window.speechSynthesis.speak(utter);
    // Fix bug Chrome : la voix peut se bloquer après ~15 sec
    _chromeFix=setInterval(function(){
      if(!window.speechSynthesis.speaking){clearInterval(_chromeFix);_chromeFix=null;return;}
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    },10000);
  },150);
}

function startVoiceInput(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    var nosr=currentLang==="fr"?"Le micro fonctionne seulement dans Chrome ou Edge ! 🎙️":
             currentLang==="sv"?"Mikrofonen fungerar bara i Chrome eller Edge! 🎙️":
             "Microphone only works in Chrome or Edge! 🎙️";
    addMsg(nosr,"bot");return;
  }
  // Détection file:// dans Chrome → bloqué. Edge OK.
  if(location.protocol==="file:"&&navigator.userAgent.indexOf("Edg/")===-1&&navigator.userAgent.indexOf("Edge/")===-1){
    var filemsg=currentLang==="fr"?
      "&#9888;&#65039; Dans Chrome, le micro est bloque sur les fichiers locaux.<br>Ouvre <strong>xearnes.html dans Microsoft Edge</strong> a la place !":
      currentLang==="sv"?
      "&#9888;&#65039; I Chrome ar mikrofonen blockerad. Oppna filen i Microsoft Edge istallet!":
      "&#9888;&#65039; In Chrome, mic is blocked on local files. Open <strong>xearnes.html in Microsoft Edge</strong> instead!";
    addMsg(filemsg,"bot");return;
  }
  // Créer un NOUVEL objet à chaque fois — évite les blocages
  if(recognition){try{recognition.abort();}catch(e){} recognition=null;}
  _finalSent=false;
  _micAttempts=0;
  recognition=new SR();
  recognition.continuous=false;
  recognition.interimResults=true;
  recognition.lang=langs[currentLang].code;
  // Timeout 7s — si rien n arrive, message clair
  var _micTimer=setTimeout(function(){
    if(isRecording&&!_finalSent){
      stopVoiceInput();
      var tmsg=currentLang==="fr"?"&#127760; Le micro ne repond pas. Utilise <strong>LANCER_XEARNES.bat</strong> et parle en <strong>francais</strong> (drapeau &#127467;&#127479; en haut) !":
              currentLang==="sv"?"&#127760; Mikrofonen svarar inte. Använd <strong>LANCER_XEARNES.bat</strong> i Edge!":
              "&#127760; Mic not responding. Use <strong>LANCER_XEARNES.bat</strong> and make sure language matches what you speak!";
      addMsg(tmsg,"bot");
    }
  },7000);
  recognition.onstart=function(){
    _micAttempts++;
    isRecording=true;
    var btn=document.getElementById("micBtn");
    if(btn)btn.classList.add("recording");
    var inp=document.getElementById("userInput");
    var ph=currentLang==="fr"?"Je t ecoute...":currentLang==="sv"?"Jag lyssnar...":
           currentLang==="es"?"Te escucho...":currentLang==="de"?"Ich hore zu...":
           currentLang==="it"?"Ti ascolto...":currentLang==="pt"?"Estou a ouvir...":"Listening...";
    if(inp){inp.value="";inp.placeholder=ph;}
  };
  recognition.onresult=function(e){
    clearTimeout(_micTimer);
    _micAttempts=0;
    var transcript="";
    for(var i=0;i<e.results.length;i++){transcript+=e.results[i][0].transcript;}
    var inp=document.getElementById("userInput");
    if(inp){inp.value=transcript;autoResize(inp);}
    _finalSent=true;
    stopVoiceInput();
    setTimeout(function(){sendMsg();},200);
  };
  recognition.onerror=function(e){
    clearTimeout(_micTimer);
    stopVoiceInput();
    var errCode=e.error||"";
    if((errCode==="network"||errCode==="no-speech"||errCode==="")&&_micAttempts<3){
      // Retry silencieux
      setTimeout(function(){startVoiceInput();},600);
    }else{
      _micAttempts=0;
      var msg=errCode==="not-allowed"?"&#127908; Autorise le micro dans le navigateur !":
              errCode==="audio-capture"?"&#127908; Aucun micro detecte !":
              errCode==="service-not-allowed"?"&#127908; Utilise LANCER_XEARNES.bat dans Edge !":
              errCode==="network"?"&#127908; Les serveurs vocaux sont injoignables.<br>&#128161; <strong>Astuce :</strong> Clique dans la boite de texte puis appuie sur <strong>Windows + H</strong> pour dicter avec Windows ! Ca marche sans internet &#128640;":
              "&#127908; Micro : "+errCode+". Reclique sur &#127908; pour reessayer !";
      addMsg(msg,"bot");
    }
  };
  recognition.onend=function(){
    clearTimeout(_micTimer);
    if(isRecording)stopVoiceInput();
    // Si un texte est dans l'input mais pas encore envoyé → envoyer quand même
    if(!_finalSent){
      var inp=document.getElementById("userInput");
      if(inp&&inp.value.trim().length>0){
        _finalSent=true;
        setTimeout(function(){sendMsg();},200);
      }
    }
  };
  try{recognition.start();}
  catch(e){
    stopVoiceInput();
    addMsg(currentLang==="fr"?"Impossible de demarrer le micro. Recharge la page !":
           "Could not start microphone. Try reloading the page!","bot");
  }
}

function playBeep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator();var g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type="sine";o.frequency.value=660;
    g.gain.setValueAtTime(0.08,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.25);
    setTimeout(function(){try{ctx.close();}catch(e){}},350);
  }catch(e){}
}

function guessPendu(letter){

  var lost=penduState.wrong>=penduState.maxWrong;

    var bst=mx?-99:99;
    for(var i=0;i<9;i++){if(!bd[i]){var nb=bd.slice();nb[i]=mx?'O':'X';var s=mm(nb,!mx);bst=mx?Math.max(bst,s):Math.min(bst,s);}}
    return bst;
  }
  var best=-99,mv=0;
  for(var i=0;i<9;i++){if(!b[i]){var nb=b.slice();nb[i]='O';var s=mm(nb,false);if(s>best){best=s;mv=i;}}}
  return mv;
}

var memoryState=null;
var MEM_EMOJIS=['🐶','🐱','🐸','🦊','🐼','🦁','🐯','🦋'];
function detectMemory(n,lang){
  if(lang==='fr')return n.indexOf('memory')!==-1||n.indexOf('paires')!==-1||(n.indexOf('memo')!==-1&&n.indexOf('jeu')!==-1);
  if(lang==='sv')return n.indexOf('memory')!==-1||(n.indexOf('par')!==-1&&n.indexOf('kort')!==-1);
  return n.indexOf('memory')!==-1||n.indexOf('pairs')!==-1||n.indexOf('matching')!==-1;
}
function startMemory(lang,noTrack){
  if(!noTrack){xnStats.gamesPlayed=(xnStats.gamesPlayed||0)+1;saveStats();checkBadges();}
  var em=MEM_EMOJIS.slice();
  var cards=em.concat(em).sort(function(){return Math.random()-.5;});
  memoryState={cards:cards,flipped:[],matched:[],moves:0,lang:lang,lock:false};
  var t=lang==='fr'?'🃏 Memory — Trouve les 8 paires !':lang==='sv'?'🃏 Memory — Hitta de 8 paren!':'🃏 Memory — Find the 8 pairs!';
  var sc=lang==='fr'?'Coups: 0':lang==='sv'?'Drag: 0':'Moves: 0';

}
function memoryClick(i){
  var s=memoryState;
  if(!s||s.lock||s.flipped.indexOf(i)!==-1||s.matched.indexOf(i)!==-1)return;
  s.flipped.push(i);
  updateMemCard(i,'flipped');
  if(s.flipped.length===2){
    s.moves++;
    var sc=document.getElementById('mem-score');
    if(sc)sc.textContent=(s.lang==='fr'?'Coups: ':s.lang==='sv'?'Drag: ':'Moves: ')+s.moves;
    s.lock=true;
    var a=s.flipped[0],b=s.flipped[1];
    if(s.cards[a]===s.cards[b]){
      s.matched.push(a,b);s.flipped=[];s.lock=false;
      updateMemCard(a,'matched');updateMemCard(b,'matched');
      if(s.matched.length===16){
        setTimeout(function(){
          addMsg(s.lang==='fr'?'🎉 Bravo ! Toutes les paires en '+s.moves+' coups ! +30 ⭐':
                 s.lang==='sv'?'🎉 Bra jobbat! Alla par på '+s.moves+' drag! +30 ⭐':
                 '🎉 All pairs found in '+s.moves+' moves! +30 ⭐','bot');
          addScore(30);playBeep();
          xnStats.memoryDone=(xnStats.memoryDone||0)+1;saveStats();checkBadges();
        },400);
      }
    }else{
      setTimeout(function(){
        updateMemCard(a,'hidden');updateMemCard(b,'hidden');
        s.flipped=[];s.lock=false;
      },950);
    }
  }
}
function updateMemCard(i,state){
  var grid=document.getElementById('memory-board');
  if(!grid)return;
  var btn=grid.querySelectorAll('.mem-card')[i];
  if(!btn)return;
  var s=memoryState;
  if(state==='flipped'){btn.className='mem-card flipped';btn.textContent=s.cards[i];}
  else if(state==='matched'){btn.className='mem-card matched';btn.disabled=true;btn.textContent=s.cards[i];}
  else{btn.className='mem-card';btn.textContent='?';}
}

var snakeState=null;
function detectSnake(n,lang){
  if(lang==='fr')return n.indexOf('snake')!==-1||n.indexOf('serpent')!==-1;
  if(lang==='sv')return n.indexOf('snake')!==-1||n.indexOf('orm')!==-1;
  return n.indexOf('snake')!==-1;
}
function startSnake(lang,noTrack){
  if(!noTrack){xnStats.gamesPlayed=(xnStats.gamesPlayed||0)+1;saveStats();checkBadges();}
  if(snakeState&&snakeState.loop){clearInterval(snakeState.loop);}
  if(snakeState&&snakeState._kh){document.removeEventListener('keydown',snakeState._kh);}
  var sz=16,cell=16;
  snakeState={
    lang:lang,sz:sz,cell:cell,
    snake:[[8,8],[8,7],[8,6]],
    dir:[0,1],nextDir:[0,1],
    food:[Math.floor(Math.random()*sz),Math.floor(Math.random()*sz)],
    score:0,on:true,loop:null,_kh:null
  };
  var px=sz*cell;
  var t=lang==='fr'?'🐍 Snake — Mange les pommes !':lang==='sv'?'🐍 Snake — Ät äpplena!':'🐍 Snake — Eat the apples!';
  var h='<div class="game-card"><div class="game-title">'+t+'</div><div class="snake-wrap">';
  h+='<div class="game-score" id="snake-score">Score: 0</div>';
  h+='<canvas id="snake-canvas" class="snake-canvas" width="'+px+'" height="'+px+'"></canvas>';
  var rb=lang==='fr'?'🔄 Rejouer':lang==='sv'?'🔄 Spela igen':'🔄 Play again';
  h+='<div class="snake-dpad">';
  h+='<div></div><button class="snake-btn" ontouchstart="snakeDir(0,-1)" onclick="snakeDir(0,-1)">▲</button><div></div>';
  h+='<button class="snake-btn" ontouchstart="snakeDir(-1,0)" onclick="snakeDir(-1,0)">◀</button>';
  h+='<button class="snake-btn" ontouchstart="snakePause()" onclick="snakePause()" style="font-size:.7rem">⏸</button>';
  h+='<button class="snake-btn" ontouchstart="snakeDir(1,0)" onclick="snakeDir(1,0)">▶</button>';
  h+='<div></div><button class="snake-btn" ontouchstart="snakeDir(0,1)" onclick="snakeDir(0,1)">▼</button><div></div>';
  h+='</div><button class="game-restart" onclick="restartSnake(this)">'+rb+'</button></div></div>';
  return h;
}
function snakeAfterRender(){
  if(!snakeState)return;
  snakeDraw();
  snakeState.loop=setInterval(snakeStep,150);
  snakeState._kh=function(e){
    var k={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
    if(k[e.key]){e.preventDefault();var d=k[e.key];snakeDir(d[0],d[1]);}
  };
  document.addEventListener('keydown',snakeState._kh);
}
function snakePause(){
  if(!snakeState)return;
  if(snakeState.loop){clearInterval(snakeState.loop);snakeState.loop=null;}
  else if(snakeState.on){snakeState.loop=setInterval(snakeStep,150);}
}
function snakeDir(dx,dy){
  if(!snakeState||!snakeState.on)return;
  var c=snakeState.dir;
  if(dx===-c[0]&&dy===-c[1])return; // pas de demi-tour
  snakeState.nextDir=[dx,dy];
}
function snakeStep(){
  var s=snakeState;if(!s||!s.on)return;
  s.dir=s.nextDir.slice();
  var h=s.snake[0];
  var nh=[h[0]+s.dir[0],h[1]+s.dir[1]];
  if(nh[0]<0||nh[0]>=s.sz||nh[1]<0||nh[1]>=s.sz){snakeOver();return;}
  for(var i=0;i<s.snake.length;i++){if(s.snake[i][0]===nh[0]&&s.snake[i][1]===nh[1]){snakeOver();return;}}
  s.snake.unshift(nh);
  if(nh[0]===s.food[0]&&nh[1]===s.food[1]){
    s.score++;
    var sc=document.getElementById('snake-score');if(sc)sc.textContent='Score: '+s.score;
    do{s.food=[Math.floor(Math.random()*s.sz),Math.floor(Math.random()*s.sz)];}
    while(s.snake.some(function(c){return c[0]===s.food[0]&&c[1]===s.food[1];}));
  }else{s.snake.pop();}
  snakeDraw();
}
function snakeDraw(){
  var s=snakeState;if(!s)return;
  var canvas=document.getElementById('snake-canvas');if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var c=s.cell,g=s.sz,px=g*c;
  ctx.fillStyle='#050a1f';ctx.fillRect(0,0,px,px);
  // Grille légère
  ctx.strokeStyle='rgba(42,47,108,.4)';ctx.lineWidth=.5;
  for(var i=0;i<=g;i++){
    ctx.beginPath();ctx.moveTo(i*c,0);ctx.lineTo(i*c,px);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*c);ctx.lineTo(px,i*c);ctx.stroke();
  }
  // Pomme
  ctx.font=(c+2)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🍎',s.food[0]*c+c/2,s.food[1]*c+c/2);
  // Corps du serpent
  for(var j=s.snake.length-1;j>=0;j--){
    var pct=(s.snake.length-j)/s.snake.length;
    ctx.fillStyle='hsl('+(110+j*2)+',70%,'+(30+pct*35)+'%)';
    ctx.beginPath();
    var _x=s.snake[j][0]*c+1,_y=s.snake[j][1]*c+1,_w=c-2,_h=c-2,_r=3;
    if(ctx.roundRect){ctx.roundRect(_x,_y,_w,_h,_r);}
    else{ctx.rect(_x,_y,_w,_h);}
    ctx.fill();
  }
  // Yeux de la tête
  var hd=s.snake[0];
  ctx.fillStyle='#fff';
  ctx.fillRect(hd[0]*c+3,hd[1]*c+3,3,3);
  ctx.fillRect(hd[0]*c+c-6,hd[1]*c+3,3,3);
  ctx.fillStyle='#000';
  ctx.fillRect(hd[0]*c+4,hd[1]*c+4,1,1);
  ctx.fillRect(hd[0]*c+c-5,hd[1]*c+4,1,1);
}
function snakeOver(){
  var s=snakeState;if(!s)return;
  s.on=false;
  if(s.loop){clearInterval(s.loop);s.loop=null;}
  if(s._kh){document.removeEventListener('keydown',s._kh);s._kh=null;}
  var canvas=document.getElementById('snake-canvas');
  if(canvas){
    var ctx=canvas.getContext('2d');
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#DAA520';ctx.font='bold 26px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-18);
    ctx.font='16px Segoe UI';ctx.fillStyle='#fff';
    ctx.fillText('Score: '+s.score,canvas.width/2,canvas.height/2+14);
  }
  setTimeout(function(){
    if(s.score>0){
      addScore(s.score*3);playBeep();
      if(s.score>(xnStats.snakeMaxScore||0)){xnStats.snakeMaxScore=s.score;saveStats();}
      checkBadges();
    }
  },600);
}

var _sessionId=Math.random().toString(36).slice(2,10)+Date.now().toString(36);
var _presenceLock=false;
var _presenceTimer=null;
var _presenceExpiry=120000; // 2 minutes = considéré "en ligne"

function updatePresence(remove){
  if(_presenceLock)return;
  _presenceLock=true;
  // Mode local : pas de Firebase configuré
  if(!FIREBASE_URL){renderOnline(1);_presenceLock=false;return;}
  var myUrl=FIREBASE_URL+"/xearnes/presence/"+_sessionId+".json";
  if(remove){
    // Supprimer notre session au départ
    fetch(myUrl,{method:"DELETE"})
      .then(function(){_presenceLock=false;})
      .catch(function(){_presenceLock=false;});
    return;
  }
  // Écrire notre présence
  var myData={ts:Date.now(),name:xnUser?xnUser.name:null};
  fetch(myUrl,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(myData)})
    .then(function(){return fetch(FIREBASE_URL+"/xearnes/presence.json");})
    .then(function(r){return r.json();})
    .then(function(d){
      var now=Date.now();
      var count=0;
      if(d&&typeof d==="object"){
        // Compter les sessions récentes (< 2 min)
        Object.values(d).forEach(function(u){if(u&&u.ts&&(now-u.ts)<_presenceExpiry)count++;});
        // Nettoyer les très vieilles sessions (>6 min) — meilleur effort
        Object.keys(d).forEach(function(k){
          if(d[k]&&d[k].ts&&(now-d[k].ts)>_presenceExpiry*3){
            fetch(FIREBASE_URL+"/xearnes/presence/"+k+".json",{method:"DELETE"}).catch(function(){});
          }
        });
      }
      renderOnline(Math.max(1,count));
      _presenceLock=false;
    })
    .catch(function(){renderOnline(1);_presenceLock=false;});
}
function renderOnline(count){
  var el=document.getElementById('onlineCount');
  var badge=document.getElementById('onlineBadge');
  if(!el)return;
  var lang=currentLang;
  if(count<=0)count=1; // on compte toujours soi-même
  var txt=lang==='sv'?(count+' online'):lang==='en'?(count+(count===1?' player':' players')+' online'):(count+' en ligne');
  el.textContent=txt;
  if(badge)badge.title=lang==='sv'?('Spelare online just nu: '+count):lang==='en'?('Players online right now: '+count):('Joueurs en ligne en ce moment : '+count);
}

  name=name.trim();
  if(!name||name.length<2)return{ok:false,msg:"Pseudo trop court (min 2 caractères) !"};
  if(/[<>"']/.test(name))return{ok:false,msg:"Pseudo invalide (caractères interdits) !"};
  if(!pass||pass.length<4)return{ok:false,msg:"Mot de passe trop court (min 4 caractères) !"};
  var h=_hashPass(name,pass);
  var key="xn_acc_"+name.toLowerCase().replace(/[^a-z0-9]/g,"_");
  if(isNew){
    if(localStorage.getItem(key))return{ok:false,msg:"Ce pseudo est déjà pris sur cet appareil !"};
    localStorage.setItem(key,h);
  }else{
    var stored=localStorage.getItem(key);
    if(!stored)return{ok:false,msg:"Pseudo introuvable — crée un compte !"};
    if(stored!==h)return{ok:false,msg:"Mauvais mot de passe !"};
  }
  xnUser={name:name,hash:h};
  try{localStorage.setItem("xn_user",JSON.stringify(xnUser));}catch(e){}
  return{ok:true};
}
function logoutUser(){
  xnUser=null;
  localStorage.removeItem("xn_user");
  renderUserBar();
}
function renderUserBar(){
  var btn=document.getElementById("userBtn");
  if(!btn)return;
  if(xnUser){
    btn.innerHTML="&#128100; "+xnUser.name.slice(0,12);
    btn.title="Connecté : "+xnUser.name+" — cliquer pour se déconnecter";
    btn.onclick=function(){if(confirm("Se déconnecter de "+xnUser.name+" ?")){logoutUser();}};
  }else{
    btn.innerHTML="&#128100; Connexion";
    btn.title="Se connecter / créer un compte";
    btn.onclick=openLoginModal;
  }
  // Afficher/masquer hint lb
  var hint=document.getElementById("lbLoginHint");
  if(hint)hint.style.display=xnUser?"none":"block";
  if(!xnUser){
    var htxt=document.getElementById("lbLoginHintTxt");
    if(htxt)htxt.textContent=currentLang==="sv"?"Logga in för att synas i världsrankningen!":currentLang==="en"?"Log in to appear in the world ranking!":"Connecte-toi pour figurer dans le classement !";
  }
}
// ── LOGIN MODAL ──
var _loginTab="login";
function openLoginModal(){
  if(xnUser){if(confirm("Se déconnecter de "+xnUser.name+" ?")){logoutUser();}return;}
  var o=document.getElementById("loginOverlay");if(o)o.classList.add("open");
  document.getElementById("loginErr").textContent="";
  document.getElementById("loginName").value="";
  document.getElementById("loginPass").value="";
  switchLoginTab("login");
  setTimeout(function(){var el=document.getElementById("loginName");if(el)el.focus();},100);
}
function closeLoginModal(){
  var o=document.getElementById("loginOverlay");if(o)o.classList.remove("open");
}
function switchLoginTab(tab){
  _loginTab=tab;
  document.getElementById("tabLogin").classList.toggle("active",tab==="login");
  document.getElementById("tabRegister").classList.toggle("active",tab==="register");
  var btn=document.getElementById("loginSubmitBtn");
  if(btn)btn.textContent=tab==="login"?(currentLang==="sv"?"Logga in":currentLang==="en"?"Log in":"Se connecter"):(currentLang==="sv"?"Skapa konto":currentLang==="en"?"Create account":"Créer mon compte");
  var tabEl=document.getElementById("tabLogin");
  if(tabEl)tabEl.textContent=currentLang==="sv"?"Logga in":currentLang==="en"?"Login":"Connexion";
  var tabEl2=document.getElementById("tabRegister");
  if(tabEl2)tabEl2.textContent=currentLang==="sv"?"Registrera":currentLang==="en"?"Sign up":"Inscription";
  document.getElementById("loginErr").textContent="";
}
function submitLogin(){
  var name=document.getElementById("loginName").value.trim();
  var pass=document.getElementById("loginPass").value;
  var res=loginUser(name,pass,_loginTab==="register");
  if(!res.ok){document.getElementById("loginErr").textContent=res.msg;return;}
  closeLoginModal();
  renderUserBar();
  checkBadges(); // Badge "Citoyen Xearnes" pour toute connexion
  updatePresence(false); // Met à jour la présence avec le nom
  var isNew=_loginTab==="register";
  var msg=isNew
    ?(currentLang==="sv"?"&#127881; Välkommen <strong>"+xnUser.name+"</strong>! Konto skapat! Du kan nu synas i världsrankningen &#127758;":currentLang==="en"?"&#127881; Welcome <strong>"+xnUser.name+"</strong>! Account created! You can now appear in the world ranking &#127758;":"&#127881; Bienvenue <strong>"+xnUser.name+"</strong> ! Compte créé ! Tu peux maintenant figurer dans le classement mondial &#127758;")
    :(currentLang==="sv"?"&#128075; Kul att se dig igen, <strong>"+xnUser.name+"</strong>!":currentLang==="en"?"&#128075; Welcome back, <strong>"+xnUser.name+"</strong>!":"&#128075; Content de te revoir, <strong>"+xnUser.name+"</strong> !");
  addMsg(msg,"bot");
  playBeep();
  if(score>0)pushScore();
}
// ── LEADERBOARD ──
var _lbOpen=false;
var _lbCache=null;
var _pushTimer=null;
function _escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fetchLeaderboard(cb){
  // Mode local — pas de Firebase
  if(!FIREBASE_URL){
    var loc=[];try{loc=JSON.parse(localStorage.getItem("xn_lb")||"[]");}catch(e){}
    _lbCache=loc;cb(loc);return;
  }
  fetch(FIREBASE_URL+"/xearnes/leaderboard.json")
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d){_lbCache=[];cb([]);return;}
      var arr=Object.values(d).filter(function(x){return x&&x.name&&typeof x.score==="number";});
      arr.sort(function(a,b){return b.score-a.score;});
      arr=arr.slice(0,100);
      _lbCache=arr;cb(arr);
    })
    .catch(function(){cb(_lbCache||[]);});
}
function pushScore(){
  if(!xnUser||score<=0)return;
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(function(){
    var entry={name:xnUser.name,score:score,date:new Date().toISOString().slice(0,10)};
    // Toujours sauvegarder localement
    var loc=[];try{loc=JSON.parse(localStorage.getItem("xn_lb")||"[]");}catch(e){}
    var idx=loc.findIndex(function(x){return x.name.toLowerCase()===xnUser.name.toLowerCase();});
    if(idx>=0){if(score>loc[idx].score)loc[idx]=entry;}else{loc.push(entry);}
    loc.sort(function(a,b){return b.score-a.score;});
    try{localStorage.setItem("xn_lb",JSON.stringify(loc.slice(0,100)));}catch(e){}
    if(!FIREBASE_URL){_lbCache=loc;if(_lbOpen)renderLeaderboard(loc);return;}
    // Envoi Firebase — une entrée par utilisateur (clé = pseudo normalisé)
    var key=xnUser.name.toLowerCase().replace(/[^a-z0-9]/g,"_").slice(0,40);
    fetch(FIREBASE_URL+"/xearnes/leaderboard/"+key+".json",{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(entry)
    })
    .then(function(){fetchLeaderboard(function(s){_lbCache=s;if(_lbOpen)renderLeaderboard(s);});})
    .catch(function(){});
  },3000);
}
function toggleLeaderboardPanel(){
  _lbOpen=!_lbOpen;
  var panel=document.getElementById("lbPanel");if(!panel)return;
  panel.classList.toggle("open",_lbOpen);
  if(_lbOpen){
    var vp=document.getElementById("voicePanel");if(vp)vp.classList.remove("open");
    var hp=document.getElementById("histPanel");if(hp)hp.classList.remove("open");
    var bp=document.getElementById("badgePanel");if(bp)bp.classList.remove("open");
    updateLbTitle();
    var body=document.getElementById("lbBody");
    if(body)body.innerHTML="<div class='lb-loading'>&#9203; "+(currentLang==="sv"?"Laddar...":currentLang==="en"?"Loading...":"Chargement...")+"</div>";
    fetchLeaderboard(function(scores){renderLeaderboard(scores);});
    renderUserBar();
  }
  var btn=document.getElementById("lbBtn");if(btn)btn.classList.toggle("active",_lbOpen);
}
function updateLbTitle(){
  var el=document.getElementById("lbTitle");
  if(el)el.innerHTML=currentLang==="sv"?"&#127758; Världsrankning":currentLang==="en"?"&#127758; World Ranking":"&#127758; Classement mondial";
}
function renderLeaderboard(scores){
  var body=document.getElementById("lbBody");
  var myRank=document.getElementById("lbMyRank");
  if(!body)return;
  if(!scores||scores.length===0){
    var emptyMsg=FIREBASE_URL
      ?(currentLang==="sv"?"&#128640; Inga poäng än... Var den förste!":currentLang==="en"?"&#128640; No scores yet... Be the first!":"&#128640; Aucun score encore... Sois le premier !")
      :(currentLang==="sv"?"&#128640; Inga poäng ännu. Anslut Firebase för världsrankning!":currentLang==="en"?"&#128640; No scores yet. Connect Firebase for world ranking!":"&#128640; Aucun score encore. <br><small>Mode local — configure Firebase pour le classement mondial !</small>");
    body.innerHTML="<div class='lb-empty'>"+emptyMsg+"</div>";
    if(myRank)myRank.style.display="none";
    renderUserBar();return;
  }
  var medals=["&#129351;","&#129352;","&#129353;"];
  var myPos=-1;
  if(xnUser){for(var i=0;i<scores.length;i++){if(scores[i].name.toLowerCase()===xnUser.name.toLowerCase()){myPos=i;break;}}}
  var top=scores.slice(0,10);
  var html="";
  top.forEach(function(s,i){
    var isMe=xnUser&&s.name.toLowerCase()===xnUser.name.toLowerCase();
    var rank=i<3?medals[i]:"<span style='font-size:.8rem;color:var(--text2)'>#"+(i+1)+"</span>";
    html+="<div class='lb-row"+(isMe?" me":"")+"'>";
    html+="<span class='lb-rank'>"+rank+"</span>";
    html+="<div class='lb-info'><div class='lb-name'>"+_escHtml(s.name)+(isMe?" &#128072;":"")+"</div><div class='lb-date'>"+(s.date||"")+"</div></div>";
    html+="<span class='lb-score'>"+s.score+" &#11088;</span></div>";
  });
  body.innerHTML=html;
  if(myRank){
    var lang=currentLang;
    if(xnUser&&myPos===-1&&score>0){
      myRank.style.display="block";
      myRank.textContent=(lang==="sv"?"&#128202; Din poäng ("+score+") är inte i topp 10 ännu":lang==="en"?"&#128202; Your score ("+score+") isn't in the top 10 yet":"&#128202; Ton score ("+score+") n'est pas encore dans le top 10");
    }else if(xnUser&&myPos>=10){
      myRank.style.display="block";
      myRank.textContent="&#128202; "+(lang==="sv"?"Du är #":lang==="en"?"You are #":"Tu es #")+(myPos+1);
    }else{myRank.style.display="none";}
  }
  renderUserBar();
}
window.addEventListener("load",init);
</script>
